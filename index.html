<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTU Bus Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚌 CTU Bus Navigator</h1>
            <p>Select a location to see all available bus routes</p>
        </header>

        <div class="search-section">
            <select id="locationSelect">
                <option value="">-- Select a Place / Sector --</option>
                <!-- Locations will be loaded here via JS -->
            </select>
        </div>

        <div id="results" class="results-area">
            <p class="placeholder-text">Please select a location above to see bus details.</p>
        </div>
    </div>

    <script src="routes.js"></script>
    <script src="script.js"></script>
</body>
</html>
